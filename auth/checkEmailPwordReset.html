<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Email Reset Password Page</title>

    <link rel="stylesheet" href="/Frontend/assets/css/output.css" />

    <link
      rel="stylesheet"
      href="path/to/font-awesome/css/font-awesome.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body
    class="bg-black text-white text-[20px] md:text-[27px] lg:text-[16px] font-sans"
  >
    <main
      class="resetPwordEmailLinkContainer flex justify-center items-center pt-12"
    >
      <section
        class="resetPwordEmailLinkSec flex flex-col justify-center items-center lg:items-start lg:flex-row gap-14 md:gap-20 lg:gap-5 w-full lg:w-[70%] h-auto lg:h-[90vh]  border-[1px] border-gray-900 rounded lg:py-0.5 lg:px-0.5"
      >
        <div
          class="flex flex-col justify-center w-full h-auto lg:h-auto px-7 md:px-10 gap-8 md:gap-12 lg:gap-4 py-5 md:py-8 lg:py-6"
        >
          <div
            class="flex justify-center items-center bg-red-600 py-2 px-2 text-white w-[70px] md:w-[100px] lg:w-[50px] hover:font-semibold text-center"
          >
            <span></span>
            <a href="/Frontend/auth/forgotPassword.html">Back</a>
          </div>

          <div class="flex justify-center items-center w-full">
            <img
                src="/Frontend/assets/Images/Whatsapp_logo-removebg-preview.png"
                alt=""
                class="w-20 h-20 md:w-24 md:h-24 lg:w-16 lg:h-16 bg-white/5 border border-white/15 py-0 px-0 md:py-0 md:px-0 lg:py-0 lg:px-0 rounded-2xl"
            />
          </div>

          <div
            class="flex flex-col justify-center items-center text-center gap-4"
          >
            <h3
              class="font-semibold text-[30px] sm:text-[20px] md:text-[45px] lg:text-[36px] text-white/80"
            >
              Check Your Email
            </h3>
            <p class="text-white/85">
              We sent a password reset link to your email. Please check your
              inbox.
            </p>
          </div>

          <div class="openEmailDiv flex w-full justify-center items-center">
            <a
              href="/Frontend/auth/resetPassword.html"
              class="flex w-full justify-center items-center font-semibold py-3 md:py-5 lg:py-3 px-3 rounded bg-red-600 mt-10 md:mt-12 lg:mt-6 border-2 border-white/50 hover:bg-linear-to-r from-red-800 via-red-400 to-white/30 hover:font-bold"
              >Open Gmail</a
            >
          </div>

          <div
            class="flex justify-center items-center gap-1 md:gap-3 lg:gap-1 text-white/50 mt-3.5 text-[18px] md:text-[27px] lg:text-[16px]"
          >
            Didn't receive the email?
            <a
              href="/Frontend/auth/signUp.html"
              class="hover:text-red-600 text-white/80"
              >Resend</a
            >
          </div>

          <div
            class="flex flex-row justify-between w-full mt-10 md:mt-30 lg:mt-14 lg:pt-20 text-[18px] md:text-[27px] lg:text-[16px] text-white/80"
          >
            <div class="flex flex-row gap-1 lg:gap-3 md:gap-5">
              <a href="" class="hover:text-red-600 text-white/80">Terms</a>
              <a href="" class="hover:text-red-600 text-white/80">Privacy</a>
              <a href="" class="hover:text-red-600 text-white/80">Docs</a>
              <a href="" class="hover:text-red-600 text-white/80">Helps</a>
            </div>

            <div class="felx flex-row md:pr-20 lg:pr-0">
              <span></span>
              <a href="" class="hover:text-red-600 text-white/80">English</a>
            </div>
          </div>
        </div>

        <div
          class="relative flex bg-[url('/Frontend/assets/Images/image.png')] w-full h-screen lg:h-[89vh] bg-cover bg-no-repeat rounded lg:rounded-none lg:rounded-r-sm"
        >
          <div class="absolute inset-0 bg-black/60"></div>
        </div>
      </section>
    </main>

    <script src="/Frontend/assets/js/checkEmailPwordReset.js"></script>
  </body>
</html>
