<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password Page</title>

    <link rel="stylesheet" href="../assets/css/output.css" />

    <link
      rel="stylesheet"
      href="path/to/font-awesome/css/font-awesome.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-black text-white text-[20px] md:text-[27px] lg:text-[16px] font-sans">
    <main class="forgotContainer flex justify-center items-center pt-12">
      <section
        class="forgotContainerSec flex flex-col justify-center items-center lg:items-start lg:flex-row gap-14 md:gap-20 lg:gap-5 w-full lg:w-[70%] h-auto lg:h-[90vh] lg:py-0.5 lg:px-0.5 border-[1px] border-gray-900 rounded"
      >
        <div
          class="flex flex-col justify-center w-full h-auto lg:h-auto px-7 md:px-10 gap-8 md:gap-12 lg:gap-8 py-5 md:py-8 lg:py-6"
        >
          <div
            class="flex justify-center items-center bg-red-600 py-2 px-2 text-white w-[70px] md:w-[100px] lg:w-[50px] hover:font-semibold text-center"
          >
            <span></span>
            <a href="/Frontend/auth/login.html">Back</a>
          </div>

          <div
            class="flex flex-col justify-center items-center text-center gap-4"
          >
            <h3
              class="font-semibold text-[30px] sm:text-[20px] md:text-[45px] lg:text-[36px]  text-white/80"
            >
              Forgot Password
            </h3>
            <p class="text-white/85">
              No worries! Enter your email address below, and we will send you a
              link to reset your password
            </p>
          </div>

          <div class="mt-3 md:mt-5 lg:mt-3">
            <div
              class="email flex flex-col w-full gap-2 md:gap-3 lg:gap-1 mt-3"
            >
              <label for="" class=" text-white/80">Email:</label>
              <input
                type="text"
                name="email"
                id="email"
                placeholder="Enter your Email"
                class="email w-full py-3 px-3 md:py-5 lg:py-3 rounded border-2 border-white/15 outline-none text-white/60 bg-black/60"
              />
            </div>
          </div>

          <div
            class="submitDiv flex w-full justify-center items-center "
          >
            <a href="/Frontend/auth/checkEmailPwordReset.html" class=" flex w-full justify-center items-center font-semibold py-3 md:py-5 lg:py-3 px-3 rounded bg-red-600 mt-10 md:mt-12 lg:mt-6 border-2 border-white/50 hover:bg-linear-to-r from-red-800 via-red-400 to-white/30 hover:font-bold">Submit</a>
          </div>

          <div
            class="flex flex-row justify-between w-full mt-10 md:mt-30 lg:mt-6 lg:pt-16 text-[18px] md:text-[27px] lg:text-[16px] text-white/80"
          >
            <div class="flex flex-row gap-1 lg:gap-3 md:gap-5">
              <a href="" class="hover:text-red-600  text-white/80">Terms</a>
              <a href="" class="hover:text-red-600  text-white/80">Privacy</a>
              <a href="" class="hover:text-red-600  text-white/80">Docs</a>
              <a href="" class="hover:text-red-600  text-white/80">Helps</a>
            </div>

            <div class="felx flex-row md:pr-20 lg:pr-0">
              <span></span>
              <a href="" class="hover:text-red-600  text-white/80">English</a>
            </div>
          </div>
        </div>

        <div
          class="relative bg-[url('/Frontend/assets/Images/image.png')] w-full h-screen lg:h-[89vh] bg-cover bg-no-repeat rounded lg:rounded-none lg:rounded-r-sm"
        >
          <div class="absolute inset-0 bg-black/60"></div>
        </div>
      </section>
    </main>

    <script src="/Frontend/assets/js/forgotPassword.js"></script>
  </body>
</html>
